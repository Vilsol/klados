name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

# Exposed to all steps so mise/aqua/gh can make authenticated GitHub API calls
# (avoids unauthenticated rate-limit 401s when fetching tool releases).
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-linux:
    name: Build Linux (amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Caches downloaded .deb files AND skips reinstall on cache hit, so the
      # gtk/webkit install drops from ~30s to a few seconds.
      - name: Install system dependencies (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libfuse2t64
          version: 1.0

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Resolve cache paths
        id: paths
        shell: bash
        run: |
          echo "go-build=$(go env GOCACHE)"  >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "pnpm-store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules + build
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.paths.outputs.go-build }}
            ${{ steps.paths.outputs.go-mod }}
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.paths.outputs.pnpm-store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Build & package
        run: mise exec -- task linux:package

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp bin/klados*.deb        dist/ 2>/dev/null || true
          cp bin/klados*.rpm        dist/ 2>/dev/null || true
          cp bin/klados*.pkg.tar.zst dist/ 2>/dev/null || true
          cp bin/*.AppImage         dist/ 2>/dev/null || true
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-darwin:
    name: Build macOS (universal)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Resolve cache paths
        id: paths
        shell: bash
        run: |
          echo "go-build=$(go env GOCACHE)"  >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "pnpm-store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules + build
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.paths.outputs.go-build }}
            ${{ steps.paths.outputs.go-mod }}
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.paths.outputs.pnpm-store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Build & package universal app
        run: mise exec -- task darwin:package:universal

      - name: Zip .app bundle
        run: |
          mkdir -p dist
          cd bin
          zip -r ../dist/klados-darwin-universal.zip klados.app
          cd ..
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-universal
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows (amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install NSIS
        uses: negrutiu/nsis-install@v3

      - name: Resolve cache paths
        id: paths
        shell: bash
        run: |
          echo "go-build=$(go env GOCACHE)"  >> "$GITHUB_OUTPUT"
          echo "go-mod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "pnpm-store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache Go modules + build
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.paths.outputs.go-build }}
            ${{ steps.paths.outputs.go-mod }}
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.paths.outputs.pnpm-store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Build & package
        run: mise exec -- task windows:package
        shell: bash

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp bin/klados.exe                          dist/klados-windows-amd64.exe 2>/dev/null || true
          cp build/windows/nsis/klados-installer.exe dist/klados-windows-amd64-installer.exe 2>/dev/null || true
          cp bin/klados*.msix                        dist/ 2>/dev/null || true
          ls -la dist/
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-darwin, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for release notes

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
