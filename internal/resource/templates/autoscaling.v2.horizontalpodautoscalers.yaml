# name: HorizontalPodAutoscaler
# description: Scales a Deployment based on CPU utilization
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ""
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ""
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
