group: ""
version: "v1"
resource: "nodes"
kind: "Node"
columns:
  - name: "Name"
    expr: "metadata.name"
    renderType: "text"
  - name: "Status"
    expr: "status.readinessSummary"
    renderType: "badge"
  - name: "Taints"
    expr: "has(status.taintCount) ? string(status.taintCount) : '0'"
    renderType: "text"
  - name: "Age"
    expr: "metadata.creationTimestamp"
    renderType: "age"
